name: Selector Health

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  selector-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run selector health
        id: selector_health
        continue-on-error: true
        run: npm run selector:health

      - name: Fail workflow if checks failed
        if: steps.selector_health.outcome == 'failure'
        run: exit 1
