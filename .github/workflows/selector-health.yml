name: Selector Health

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  selector-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run selector health
        id: selector_health
        continue-on-error: true
        run: npm run selector:health

      - name: Create issue for broken selectors
        if: steps.selector_health.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Selector health check failed';
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const search = await github.rest.search.issuesAndPullRequests({ q: query });

            if (search.data.total_count === 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  'The scheduled selector health workflow failed.',
                  '',
                  `Run: ${runUrl}`,
                  '',
                  'Check `npm run selector:health` locally and update selectors or backend assumptions as needed.',
                ].join('\n'),
              });
            }

      - name: Fail workflow if checks failed
        if: steps.selector_health.outcome == 'failure'
        run: exit 1
