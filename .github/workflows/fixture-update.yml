name: Fixture Update

on:
  workflow_dispatch:
  schedule:
    - cron: '23 4 * * 1'

jobs:
  fixture-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh HTML fixtures
        run: npm run fixtures:update

      - name: Measure fixture diff
        id: diff
        run: |
          git diff --numstat -- tests/fixtures/html > fixture-diff.txt || true
          total_lines=$(awk '{add += $1; del += $2} END {print add + del + 0}' fixture-diff.txt)
          changed_files=$(wc -l < fixture-diff.txt | tr -d ' ')
          echo "total_lines=${total_lines}" >> "$GITHUB_OUTPUT"
          echo "changed_files=${changed_files}" >> "$GITHUB_OUTPUT"

      - name: Create issue for large fixture drift
        if: github.event_name == 'schedule' && steps.diff.outputs.total_lines != '0' && fromJSON(steps.diff.outputs.total_lines) > 200
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Fixture drift exceeded threshold';
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const search = await github.rest.search.issuesAndPullRequests({ q: query });

            if (search.data.total_count === 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  'The scheduled fixture refresh changed HTML snapshots more than the configured threshold.',
                  '',
                  `Changed files: ${process.env.CHANGED_FILES}`,
                  `Changed lines: ${process.env.TOTAL_LINES}`,
                  `Run: ${runUrl}`,
                  '',
                  'Review `tests/fixtures/html` and adjust selectors or parsers if needed.',
                ].join('\n'),
              });
            }
        env:
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
          TOTAL_LINES: ${{ steps.diff.outputs.total_lines }}

      - name: Upload refreshed fixtures
        if: steps.diff.outputs.changed_files != '0'
        uses: actions/upload-artifact@v4
        with:
          name: html-fixtures
          path: tests/fixtures/html
