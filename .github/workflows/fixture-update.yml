name: Fixture Update

on:
  workflow_dispatch:
  schedule:
    - cron: '23 4 * * 1'

jobs:
  fixture-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Refresh HTML fixtures
        run: npm run fixtures:update

      - name: Measure fixture diff
        id: diff
        run: |
          git diff --numstat -- tests/fixtures/html > fixture-diff.txt || true
          total_lines=$(awk '{add += $1; del += $2} END {print add + del + 0}' fixture-diff.txt)
          changed_files=$(wc -l < fixture-diff.txt | tr -d ' ')
          echo "total_lines=${total_lines}" >> "$GITHUB_OUTPUT"
          echo "changed_files=${changed_files}" >> "$GITHUB_OUTPUT"

      - name: Upload refreshed fixtures
        if: steps.diff.outputs.changed_files != '0'
        uses: actions/upload-artifact@v4
        with:
          name: html-fixtures
          path: tests/fixtures/html
